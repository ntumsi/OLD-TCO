# Converted from azure-pipelines.yml
# Requires a GitLab Runner registered with the 'aws-windows' tag running on an
# AWS EC2 Windows instance that has Visual Studio 2019 Enterprise, Node.js,
# NuGet, MSBuild, and the AWS CLI available.
#
# Required CI/CD variables (set in GitLab → Settings → CI/CD → Variables):
#   AWS_ACCESS_KEY_ID       – IAM access key with S3 and CodeDeploy permissions
#   AWS_SECRET_ACCESS_KEY   – corresponding IAM secret key
#   AWS_DEFAULT_REGION      – e.g. us-east-1
#   S3_BUCKET               – name of the S3 bucket used for build artifacts
#   CODEDEPLOY_APP          – AWS CodeDeploy application name
#   CODEDEPLOY_GROUP        – AWS CodeDeploy deployment group name

variables:
  SOLUTION: "**\\*.sln"
  ARTIFACT_NAME: "drop"
  PUBLISH_PROFILE: "Development"
  BUILD_CONFIGURATION: "Release"
  BUILD_PLATFORM: "Any CPU"
  MSBUILD_PATH: 'C:\Program Files (x86)\Microsoft Visual Studio\2019\Enterprise\MSBuild\Current\Bin\msbuild.exe'
  # S3 key prefix used when uploading build artifacts
  S3_KEY_PREFIX: "builds/$CI_COMMIT_REF_SLUG/$CI_COMMIT_SHORT_SHA"

workflow:
  rules:
    # Only run on the Source/Development branch when the relevant paths change
    - if: '$CI_COMMIT_BRANCH == "Source/Development"'
      changes:
        - AMCOS.Web/**/*
        - AMCOS.AMCOS2020_MAR/**/*
        - AMCOS.Data/**/*
        - AMCOS.Logic/**/*
        - AMCOS.Tests/**/*

default:
  tags:
    - aws-windows

stages:
  - validate
  - build
  - test
  - publish
  - deploy

# ---------------------------------------------------------------------------
# Validate stage – fail fast if required CI/CD variables are missing
# ---------------------------------------------------------------------------

validate_variables:
  stage: validate
  script:
    - |
      $missing = @()
      if (-not $env:AWS_ACCESS_KEY_ID)     { $missing += "AWS_ACCESS_KEY_ID" }
      if (-not $env:AWS_SECRET_ACCESS_KEY) { $missing += "AWS_SECRET_ACCESS_KEY" }
      if (-not $env:AWS_DEFAULT_REGION)    { $missing += "AWS_DEFAULT_REGION" }
      if (-not $env:S3_BUCKET)             { $missing += "S3_BUCKET" }
      if (-not $env:CODEDEPLOY_APP)        { $missing += "CODEDEPLOY_APP" }
      if (-not $env:CODEDEPLOY_GROUP)      { $missing += "CODEDEPLOY_GROUP" }
      if ($missing.Count -gt 0) {
        Write-Error "Required CI/CD variables are not set: $($missing -join ', '). Configure them in GitLab → Settings → CI/CD → Variables."
        exit 1
      }
      Write-Host "All required CI/CD variables are present."

# ---------------------------------------------------------------------------
# Build stage – mirrors the Azure DevOps Job_1 / AMCOS Development pipeline
# ---------------------------------------------------------------------------

npm_and_gulp:
  stage: build
  needs:
    - validate_variables
  script:
    - cd AMCOS.Web
    - npm install
    - node_modules\gulp\bin\gulp.js default
  artifacts:
    paths:
      - AMCOS.Web/node_modules/
    expire_in: 1 hour

nuget_restore:
  stage: build
  needs:
    - validate_variables
  script:
    - nuget restore $SOLUTION -MSBuildPath "$MSBUILD_PATH"

build_solution:
  stage: build
  needs:
    - npm_and_gulp
    - nuget_restore
  script:
    - >
      & "$MSBUILD_PATH"
      $SOLUTION
      /p:DeployOnBuild=True
      /p:DeployDefaultTarget=WebPublish
      /p:WebPublishMethod=FileSystem
      /p:DeleteExistingFiles=True
      "/p:publishURL=$CI_PROJECT_DIR/artifacts"
      /p:PublishProfile=$PUBLISH_PROFILE
      /p:Configuration=$BUILD_CONFIGURATION
      "/p:Platform=$BUILD_PLATFORM"
      /t:Rebuild
      /m
  artifacts:
    name: "$ARTIFACT_NAME"
    paths:
      - artifacts/
    when: always
    expire_in: 7 days

# ---------------------------------------------------------------------------
# Test stage – mirrors the VSTest@2 task
# ---------------------------------------------------------------------------

test_assemblies:
  stage: test
  needs:
    - build_solution
  script:
    - >
      vstest.console.exe
      (Get-ChildItem -Recurse -Filter "*test*.dll"
        | Where-Object { $_.FullName -notmatch "\\obj\\" }
        | Select-Object -ExpandProperty FullName)
      /EnableCodeCoverage
      /Platform:$BUILD_PLATFORM
      /Configuration:$BUILD_CONFIGURATION
  artifacts:
    reports:
      junit: "**/*.trx"
    when: always

# ---------------------------------------------------------------------------
# Publish stage – upload build artifacts to S3
# ---------------------------------------------------------------------------

publish_artifact:
  stage: publish
  needs:
    - build_solution
    - test_assemblies
  when: always
  script:
    # Zip the published output (including subdirectories) so it can be handled by CodeDeploy
    - Compress-Archive -Path artifacts -DestinationPath "$ARTIFACT_NAME-$CI_COMMIT_SHORT_SHA.zip" -Force
    # Upload the archive to S3
    - >
      aws s3 cp
      "$ARTIFACT_NAME-$CI_COMMIT_SHORT_SHA.zip"
      "s3://$S3_BUCKET/$S3_KEY_PREFIX/$ARTIFACT_NAME-$CI_COMMIT_SHORT_SHA.zip"
      --region $AWS_DEFAULT_REGION
    - echo "Artifact uploaded to s3://$S3_BUCKET/$S3_KEY_PREFIX/$ARTIFACT_NAME-$CI_COMMIT_SHORT_SHA.zip"
  artifacts:
    name: "$ARTIFACT_NAME-$CI_COMMIT_SHORT_SHA"
    paths:
      - artifacts/
      - "$ARTIFACT_NAME-$CI_COMMIT_SHORT_SHA.zip"
    when: always
    expire_in: 30 days

# ---------------------------------------------------------------------------
# Deploy stage – run DB migrations then trigger AWS CodeDeploy deployment
# ---------------------------------------------------------------------------

run_db_migrations:
  stage: deploy
  needs:
    - publish_artifact
  when: on_success
  script:
    # Run PostgreSQL migrations in numeric order against the target database.
    # AMCOS_DB_HOST, AMCOS_DB_NAME, AMCOS_DB_USER, and AMCOS_DB_PASSWORD must
    # be set as protected CI/CD variables.
    - |
      $env:PGPASSWORD = $env:AMCOS_DB_PASSWORD
      $migrations = Get-ChildItem -Path "AMCOS.PostgreSQL\migrations" -Filter "*.sql" | Sort-Object Name
      foreach ($file in $migrations) {
        Write-Host "Applying migration: $($file.Name)"
        psql -h $env:AMCOS_DB_HOST -U $env:AMCOS_DB_USER -d $env:AMCOS_DB_NAME -f $file.FullName
        if ($LASTEXITCODE -ne 0) {
          Write-Error "Migration failed: $($file.Name)"
          exit 1
        }
      }
      Write-Host "All migrations applied successfully."

deploy_to_aws:
  stage: deploy
  needs:
    - run_db_migrations
  when: on_success
  script:
    # Create a CodeDeploy deployment using the artifact uploaded to S3
    - >
      aws deploy create-deployment
      --application-name $CODEDEPLOY_APP
      --deployment-group-name $CODEDEPLOY_GROUP
      --s3-location "bucket=$S3_BUCKET,key=$S3_KEY_PREFIX/$ARTIFACT_NAME-$CI_COMMIT_SHORT_SHA.zip,bundleType=zip"
      --region $AWS_DEFAULT_REGION
      --description "GitLab CI deployment for $CI_COMMIT_SHORT_SHA"
  environment:
    name: development
