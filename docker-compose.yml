version: "3.9"

services:
  keycloak-db:
    image: postgres:16-alpine
    container_name: amcos-keycloak-db
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak_password
    volumes:
      - keycloak_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak"]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:26.2
    container_name: amcos-keycloak
    command:
      - start-dev
      - --import-realm
    environment:
      # Admin credentials for the Keycloak master realm
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin

      # Database
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak_password

      # Serve under /auth to match the existing Authority URL path (/auth/realms/cave)
      KC_HTTP_RELATIVE_PATH: /auth

      # Hostname (used for token issuer; set to localhost for local dev)
      KC_HOSTNAME: localhost
      KC_HOSTNAME_PORT: "8080"
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"

      # HTTP (no TLS for local dev)
      KC_HTTP_ENABLED: "true"
    ports:
      - "8080:8080"
    volumes:
      # Realm import: Keycloak auto-imports any realm JSON placed in this directory
      - ./keycloak:/opt/keycloak/data/import
    depends_on:
      keycloak-db:
        condition: service_healthy

volumes:
  keycloak_db_data:
